{% extends "base.html" %}
{% block title %}Add User{% endblock %}
{% block page_title %}Add Member{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <div class="form-card-header">
      <h2>New Team Member</h2>
      <p>Add someone to start tracking shared expenses.</p>
    </div>
    <form method="POST" action="{{ url_for('add_user_route') }}" class="styled-form" novalidate>
      <div class="form-group">
        <label for="name">Full Name <span class="required">*</span></label>
        <input type="text" id="name" name="name" placeholder="e.g. Arjun Mehta"
               value="{{ request.form.get('name','') }}" autocomplete="name" required>
        <span class="form-hint">Used to identify this person in expenses.</span>
      </div>
      <div class="form-group">
        <label for="email">Email Address <span class="optional">(optional)</span></label>
        <input type="email" id="email" name="email" placeholder="arjun@example.com"
               value="{{ request.form.get('email','') }}" autocomplete="email">
      </div>
      <div class="form-actions">
        <a href="{{ url_for('users') }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">Add Member</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
